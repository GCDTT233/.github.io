<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web AR Пример</title>
    <!-- Подключаем скрипт model-viewer -->
    <script type="module" src="https://googleapis.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        model-viewer {
            width: 100%;
            height: 500px;
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <h2>Пример 3D-модели с поддержкой AR</h2>
    
    <!-- AR-атрибуты активируют кнопку "Посмотреть в дополненной реальности" на телефоне -->
    <model-viewer 
        src="https://modelviewer.dev" 
        ios-src="https://modelviewer.dev"
        alt="Космонавт" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="pan-y">
    </model-viewer>

    <p>Откройте эту страницу со смартфона и нажмите на иконку AR (в правом нижнем углу или на панели), чтобы увидеть модель в реальном окружении.</p>

</body>
</html>
</html>
